<!DOCTYPE html>
<html>
  <head>
    <title>Happy Birthday Rose!</title>
    <script>
      function updateParagraphText(){
        let passwordElement = document.getElementById('passwordInput');
        let labelElement = document.getElementById('label');
        let originalText = labelElement.textContent;
        if(passwordElement.value.toLowerCase().replaceAll(' ','')=='tungtungtungsahur'){
          labelElement.innerHTML = 'Congratulations Rose, you got the password correct! Your reward: <strong>a trip to Disneyland!</strong> Say "0110 0111" to Noah to redeem this reward.';
        }else{
          labelElement.innerText = 'Sorry, that is incorrect';
        }
        
      }
    </script>
  </head>
  <body>
    <p id="label">
      Enter the secret password
    </p>
    <input type="password" id="passwordInput" placeholder="secret password" size="20" required>
    <button onclick="updateParagraphText();">
      Click to submit password
    </button>
  </body>
</html>
